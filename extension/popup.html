<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f12; color: #e8e8f0;
      margin: 0; padding: 20px;
      width: 240px;
      text-align: center;
    }
    .logo { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .logo span { color: #8b5cf6; }
    .sub { font-size: 12px; color: #6b6b80; margin-bottom: 16px; }
    button {
      width: 100%; padding: 10px; background: #7c3aed; color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; margin-bottom: 8px;
    }
    button:hover { background: #8b5cf6; }
    .hint { font-size: 11px; color: #6b6b80; }
    kbd { background: #1f1f28; border: 1px solid #2a2a36; border-radius: 4px; padding: 1px 5px; font-size: 10px; }
  </style>
</head>
<body>
  <div class="logo">Omni <span>AI</span></div>
  <div class="sub">Universal AI conversation bridge</div>
  <button id="open-panel">Open Side Panel</button>
  <div class="hint">Or press <kbd>Ctrl+Shift+O</kbd></div>
  <script>
    document.getElementById("open-panel").addEventListener("click", async () => {
      const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
      if (tab?.windowId) {
        await chrome.sidePanel.open({ windowId: tab.windowId });
        window.close();
      }
    });
  </script>
</body>
</html>
